<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCare - Book Healthcare Appointments</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js"></script>
    
    <!-- Mapbox -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
        }
        
        .hero-bg {
            background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .doctor-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .doctor-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
        
        .marker {
            background: linear-gradient(135deg, #14b8a6, #0f766e);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 10px 15px -3px rgb(45 212 191 / 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        
        .nav-link {
            position: relative;
        }
        .nav-link:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: #14b8a6;
            transition: width 0.3s ease;
        }
        .nav-link:hover:after {
            width: 100%;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-teal-600 to-cyan-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <div class="text-3xl font-bold tracking-tighter text-slate-900">VitaCare</div>
            </div>
            
            <div class="hidden md:flex items-center gap-8 font-medium">
                <a href="#" class="nav-link text-slate-700 hover:text-teal-700">Find Doctors</a>
                <a href="#" class="nav-link text-slate-700 hover:text-teal-700">Hospitals</a>
                <a href="#" class="nav-link text-slate-700 hover:text-teal-700">Specialities</a>
                <a href="#" class="nav-link text-slate-700 hover:text-teal-700">For Providers</a>
            </div>

            <div id="authSection" class="flex items-center gap-4">
                <!-- Populated by JS after auth check -->
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="hero-bg text-white pt-24 pb-28">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid lg:grid-cols-2 gap-16 items-center">
                <div class="space-y-10">
                    <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md px-6 py-3 rounded-full text-sm">
                        <span class="text-teal-300">●</span>
                        Trusted by 12,450+ patients in Limpopo
                    </div>
                    
                    <h1 class="text-6xl lg:text-7xl font-extrabold leading-none tracking-tighter">
                        Healthcare,<br>made <span class="text-teal-300">simple</span>.
                    </h1>
                    
                    <p class="text-xl text-teal-100 max-w-md">
                        Book appointments with trusted doctors and hospitals near you in seconds.
                    </p>

                    <div class="bg-white rounded-3xl p-2 shadow-2xl">
                        <div class="flex flex-col md:flex-row">
                            <div class="flex-1 p-6">
                                <label class="block text-xs font-bold text-slate-400 tracking-widest mb-2">SEARCH DOCTOR / SPECIALITY</label>
                                <input id="searchInput" type="text" 
                                       placeholder="Cardiologist, Dr. Mokoena..." 
                                       class="w-full bg-transparent text-xl font-medium text-slate-900 focus:outline-none">
                            </div>
                            <div class="flex-1 p-6 border-t md:border-t-0 md:border-l">
                                <label class="block text-xs font-bold text-slate-400 tracking-widest mb-2">YOUR LOCATION</label>
                                <input id="locationInput" type="text" value="Mokopane, Limpopo" 
                                       class="w-full bg-transparent text-xl font-medium text-slate-900 focus:outline-none">
                            </div>
                            <button onclick="performSearch()" 
                                    class="bg-teal-600 hover:bg-teal-700 text-white px-12 py-6 rounded-2xl font-semibold text-lg flex items-center gap-3 transition-all">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                Search
                            </button>
                        </div>
                    </div>
                </div>

                <div class="relative hidden lg:block">
                    <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" 
                         alt="Doctor consultation" 
                         class="rounded-3xl shadow-2xl border-8 border-white/30">
                </div>
            </div>
        </div>
    </header>

    <!-- Results Section -->
    <section id="resultsSection" class="hidden max-w-7xl mx-auto px-6 py-16">
        <div class="flex justify-between items-center mb-10">
            <h2 id="resultsTitle" class="text-4xl font-bold text-slate-900">Available Healthcare Providers</h2>
            <p class="text-slate-500" id="resultCount">0 results</p>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <!-- Doctor List -->
            <div class="lg:col-span-5">
                <div id="doctorList" class="space-y-6 max-h-[720px] overflow-y-auto pr-4">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Map -->
            <div class="lg:col-span-7">
                <div class="rounded-3xl overflow-hidden shadow-2xl h-[720px] relative border border-slate-100">
                    <div id="map" class="w-full h-full"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Booking Modal -->
    <div id="bookingModal" class="fixed inset-0 bg-black/70 backdrop-blur-xl hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full overflow-hidden">
            <div class="px-8 py-6 border-b flex items-center justify-between">
                <div>
                    <h3 class="text-2xl font-bold">Book Appointment</h3>
                    <p id="modalDoctorName" class="text-teal-600 font-semibold"></p>
                </div>
                <button onclick="closeBookingModal()" class="text-4xl text-slate-300 hover:text-slate-600">×</button>
            </div>
            
            <form id="bookingForm" class="p-8 space-y-6">
                <input type="hidden" id="doctorId">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                    <input type="text" id="patientName" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:border-teal-600 focus:ring-4 focus:ring-teal-100 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Phone Number</label>
                        <input type="tel" id="patientPhone" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:border-teal-600 focus:ring-4 focus:ring-teal-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Preferred Date</label>
                        <input type="datetime-local" id="appointmentDate" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:border-teal-600 focus:ring-4 focus:ring-teal-100 outline-none">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-teal-600 to-cyan-600 hover:from-teal-700 hover:to-cyan-700 text-white font-bold py-5 rounded-2xl text-lg transition-all">
                    Confirm Booking
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        // ====================== VITA CARE - FULL CODE ======================
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
            authDomain: "fire-b-a8878.firebaseapp.com",
            databaseURL: "https://fire-b-a8878.firebaseio.com",
            projectId: "fire-b-a8878",
            storageBucket: "fire-b-a8878.firebasestorage.app",
            messagingSenderId: "658673187627",
            appId: "1:658673187627:web:32699cbc33e85f4bafa36e"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Google Auth Provider
        const provider = new firebase.auth.GoogleAuthProvider();

        // Mapbox Token - REPLACE WITH YOUR OWN
        mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';

        let map = null;
        let currentUser = null;
        let doctorsData = []; // Will be loaded from Firebase later

        // Auth UI
        function updateAuthUI(user) {
            currentUser = user;
            const authDiv = document.getElementById('authSection');
            
            if (user) {
                authDiv.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${user.photoURL}" class="w-9 h-9 rounded-full border-2 border-teal-200">
                        <div>
                            <p class="text-sm font-medium text-slate-700">${user.displayName}</p>
                        </div>
                        <button onclick="signOut()" 
                                class="px-5 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-2xl transition-colors">
                            Logout
                        </button>
                    </div>
                `;
            } else {
                authDiv.innerHTML = `
                    <button onclick="signInWithGoogle()" 
                            class="flex items-center gap-3 bg-white border border-slate-300 hover:border-slate-400 px-6 py-3 rounded-2xl font-medium text-slate-700 transition-all">
                        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" 
                             class="h-5">
                        Sign in with Google
                    </button>
                `;
            }
        }

        // Sign In with Google
        async function signInWithGoogle() {
            try {
                const result = await auth.signInWithPopup(provider);
                updateAuthUI(result.user);
                alert(`Welcome, ${result.user.displayName}!`);
            } catch (error) {
                console.error("Google Sign-in Error:", error);
                alert("Failed to sign in. Please try again.");
            }
        }

        function signOut() {
            auth.signOut().then(() => {
                updateAuthUI(null);
            });
        }

        // Initialize Map
        function initMap() {
            if (mapboxgl.accessToken === 'YOUR_MAPBOX_ACCESS_TOKEN') {
                document.getElementById('map').innerHTML = `
                    <div class="h-full flex items-center justify-center bg-slate-50 text-slate-400">
                        <div class="text-center">
                            <i class="fa-solid fa-map text-6xl mb-4"></i>
                            <p class="font-medium">Map will appear after adding Mapbox token</p>
                        </div>
                    </div>`;
                return;
            }

            map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/streets-v12',
                center: [29.0167, -24.1833], // Mokopane
                zoom: 12
            });
        }

        // Render Doctors (from Firebase in future)
        function renderDoctors(doctors) {
            const container = document.getElementById('doctorList');
            container.innerHTML = '';

            doctors.forEach(doc => {
                const card = document.createElement('div');
                card.className = "doctor-card bg-white rounded-3xl overflow-hidden border border-slate-100";
                card.innerHTML = `
                    <div class="p-7">
                        <div class="flex justify-between">
                            <div>
                                <h3 class="font-bold text-2xl">${doc.name}</h3>
                                <p class="text-teal-600 font-semibold mt-1">${doc.speciality}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-amber-500 text-xl">★</span>
                                <span class="font-bold text-slate-700">${doc.rating}</span>
                            </div>
                        </div>
                        <p class="text-slate-500 mt-4 text-sm">${doc.address}</p>
                    </div>
                    <div class="bg-slate-50 px-7 py-5 flex gap-3">
                        <button onclick="bookAppointment('${doc.id}')" 
                                class="flex-1 bg-teal-600 text-white font-bold py-4 rounded-2xl hover:bg-teal-700 transition-all">
                            Book Now
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Search Function
        function performSearch() {
            document.getElementById('resultsSection').classList.remove('hidden');
            
            // For now using placeholder data - replace with real Firebase query later
            const sampleDoctors = [
                { id: "1", name: "Dr. Thabo Mokoena", speciality: "General Practitioner", address: "Mokopane", rating: "4.9" },
                { id: "2", name: "Dr. Lerato Nkosi", speciality: "Cardiologist", address: "Mokopane", rating: "4.8" }
            ];
            
            renderDoctors(sampleDoctors);
            
            if (!map) initMap();
        }

        // Booking Modal
        let selectedDoctor = null;

        function bookAppointment(docId) {
            // In production, fetch doctor details from Firebase
            selectedDoctor = { id: docId, name: "Dr. Example" }; // Placeholder
            document.getElementById('modalDoctorName').textContent = `with ${selectedDoctor.name}`;
            document.getElementById('bookingModal').classList.remove('hidden');
            document.getElementById('bookingModal').classList.add('flex');
        }

        function closeBookingModal() {
            const modal = document.getElementById('bookingModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Booking Form Submit
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                alert("Please sign in with Google to book an appointment.");
                closeBookingModal();
                return;
            }

            const appointmentData = {
                doctorId: selectedDoctor.id,
                patientUid: currentUser.uid,
                patientName: document.getElementById('patientName').value,
                patientPhone: document.getElementById('patientPhone').value,
                appointmentDate: document.getElementById('appointmentDate').value,
                status: "pending",
                createdAt: new Date().toISOString()
            };

            try {
                const newAppointmentRef = db.ref('appointments').push();
                await newAppointmentRef.set(appointmentData);
                
                alert("✅ Appointment booked successfully! You will receive confirmation shortly.");
                closeBookingModal();
                document.getElementById('bookingForm').reset();
            } catch (error) {
                console.error(error);
                alert("Failed to book appointment. Please try again.");
            }
        });

        // Auth State Listener
        auth.onAuthStateChanged((user) => {
            updateAuthUI(user);
        });

        // Initialize on load
        window.onload = () => {
            // Show results by default for demo
            setTimeout(() => {
                document.getElementById('resultsSection').classList.remove('hidden');
                const demoDoctors = [
                    { id: "1", name: "Dr. Thabo Mokoena", speciality: "General Practitioner", address: "123 Hospital Road, Mokopane", rating: "4.9" },
                    { id: "2", name: "Dr. Lerato Nkosi", speciality: "Cardiologist", address: "45 Medical Centre, Mokopane", rating: "4.8" }
                ];
                renderDoctors(demoDoctors);
                initMap();
            }, 600);
        };
    </script>
</body>
</html>
