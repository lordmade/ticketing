<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VynixRide | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0000FF;
            --primary-gradient: linear-gradient(135deg, #3366FF 0%, #0000FF 100%);
            --bg-color: #F5F5F7;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --card-bg: #FFFFFF;
            --border-color: #E5E5EA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow: hidden; height: 100vh; }

        .app-wrapper { display: flex; height: 100vh; width: 100vw; }

        /* --- Desktop Sidebar --- */
        .sidebar {
            display: none; /* Mobile hidden */
            width: 320px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            flex-direction: column;
            padding: 32px 24px;
            z-index: 100;
        }

        @media (min-width: 900px) { .sidebar { display: flex; } }

        .brand { font-size: 24px; font-weight: 800; color: var(--primary-blue); margin-bottom: 40px; }

        /* --- Map View --- */
        .main-map {
            flex-grow: 1;
            position: relative;
            background: #E8E8ED;
            background-image: radial-gradient(#D1D1D6 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }

        .map-pin {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 24px; height: 24px;
            background: var(--primary-blue);
            border: 4px solid #FFF;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0, 0, 255, 0.4);
        }

        /* --- Ride Selector Container --- */
        .ride-selector {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
        }

        .ride-selector::-webkit-scrollbar { display: none; }

        .ride-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; border-radius: 20px; margin-bottom: 12px;
            background: #F9F9FB; cursor: pointer; border: 2px solid transparent;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ride-card.active {
            border-color: var(--primary-blue);
            background: rgba(0, 0, 255, 0.04);
            transform: translateY(-2px);
        }

        .avatar-ui {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--primary-gradient); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 15px;
        }

        /* --- Mobile Specific: Bottom Sheet --- */
        @media (max-width: 899px) {
            .ride-selector-wrapper {
                position: fixed; bottom: 0; left: 0; right: 0;
                background: var(--card-bg); height: 50vh;
                border-radius: 32px 32px 0 0; padding: 24px 20px 100px;
                z-index: 200; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            }
            .sidebar { display: none; }
        }

        /* --- Floating UI Elements --- */
        .confirm-btn {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: var(--primary-gradient); color: white;
            font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,255,0.2);
            margin-top: 15px;
        }

        .mobile-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 360px; height: 65px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            border-radius: 40px; display: flex; justify-content: space-around;
            align-items: center; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (min-width: 900px) { .mobile-nav { display: none; } }

        #auth-screen {
            position: fixed; inset: 0; background: white; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color: var(--primary-blue); font-size: 32px; margin-bottom: 30px;">VynixRide</h1>
        <button onclick="signIn()" class="confirm-btn" style="width: auto; padding: 15px 50px;">Sign in with Google</button>
    </div>

    <div class="app-wrapper" id="app-body" style="display: none;">
        
        <aside class="sidebar">
            <div class="brand">Vynix</div>
            
            <h3 style="font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Request Ride</h3>
            
            <div class="ride-selector" id="desktopRideList">
                </div>

            <button class="confirm-btn" id="desktopConfirm">Request VynixGo</button>

            <div id="user-profile" style="margin-top: auto; display: flex; align-items: center; gap: 12px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                </div>
        </aside>

        <main class="main-map">
            <div class="map-pin"></div>

            <div class="ride-selector-wrapper" id="mobileSheet">
                <div style="width: 40px; height: 5px; background: #EEE; border-radius: 10px; margin: 0 auto 20px;"></div>
                <h2 style="font-size: 20px; margin-bottom: 15px;">Available Rides</h2>
                <div class="ride-selector" id="mobileRideList"></div>
                <button class="confirm-btn" id="mobileConfirm">Request VynixGo</button>
            </div>
        </main>

        <nav class="mobile-nav">
            <div style="color: var(--primary-blue); font-weight: 700;">Ride</div>
            <div style="color: var(--text-muted);">Trips</div>
            <div style="color: var(--text-muted);">Me</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
            authDomain: "fire-b-a8878.firebaseapp.com",
            databaseURL: "https://fire-b-a8878.firebaseio.com",
            projectId: "fire-b-a8878",
            storageBucket: "fire-b-a8878.firebasestorage.app",
            messagingSenderId: "658673187627",
            appId: "1:658673187627:web:32699cbc33e85f4bafa36e",
            measurementId: "G-2505EVBRWX"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function signIn() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-body').style.display = 'flex';
                
                document.getElementById('user-profile').innerHTML = `
                    <div class="avatar-ui" style="width:38px; height:38px; background:#1D1D1F">${user.displayName.charAt(0)}</div>
                    <div>
                        <p style="font-size:14px; font-weight:600;">${user.displayName}</p>
                        <p style="font-size:12px; color:var(--text-muted);">Software Developer</p>
                    </div>
                `;
                initData();
            }
        });

        function initData() {
            db.ref('rides').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    renderUI(Object.values(data), 'desktopRideList');
                    renderUI(Object.values(data), 'mobileRideList');
                } else {
                    seed();
                }
            });
        }

        function renderUI(rides, containerId) {
            const list = document.getElementById(containerId);
            list.innerHTML = '';
            rides.forEach((ride, i) => {
                const card = document.createElement('div');
                card.className = `ride-card ${i === 0 ? 'active' : ''}`;
                card.onclick = () => {
                    document.querySelectorAll('.ride-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    const btnText = `Request ${ride.type}`;
                    document.getElementById('desktopConfirm').innerText = btnText;
                    document.getElementById('mobileConfirm').innerText = btnText;
                };

                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="avatar-ui">${ride.driver.charAt(0)}</div>
                        <div>
                            <p style="font-weight:700; font-size:14px;">${ride.type}</p>
                            <p style="font-size:12px; color:var(--text-muted);">${ride.time} away</p>
                        </div>
                    </div>
                    <p style="font-weight:700;">R ${ride.price}</p>
                `;
                list.appendChild(card);
            });
        }

        function seed() {
            db.ref('rides').set({
                r1: { type: "VynixGo", driver: "Kabelo", time: "2 min", price: 45 },
                r2: { type: "VynixComfort", driver: "Sarah", time: "5 min", price: 72 },
                r3: { type: "VynixBlack", driver: "John", time: "8 min", price: 110 }
            });
        }
    </script>
</body>
</html>
