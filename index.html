<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VynixRide | Real-time</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0000FF;
            --primary-gradient: linear-gradient(135deg, #3366FF 0%, #0000FF 100%);
            --bg-color: #F5F5F7;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --card-bg: #FFFFFF;
            --border-color: #E5E5EA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow: hidden; }

        .layout-wrapper { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* --- Desktop Sidebar --- */
        .sidebar {
            display: none; width: 280px; background: var(--card-bg); border-right: 1px solid var(--border-color);
            flex-direction: column; padding: 24px; z-index: 50;
        }

        .nav-link {
            display: flex; align-items: center; gap: 16px; padding: 14px 16px; border-radius: 12px;
            color: var(--text-muted); font-weight: 500; text-decoration: none; cursor: pointer; transition: 0.2s;
        }

        .nav-link.active { background: rgba(0, 0, 255, 0.05); color: var(--primary-blue); }

        /* --- Main Content --- */
        .main-content { flex-grow: 1; position: relative; height: 100vh; }
        .map-view { 
            width: 100%; height: 100%; background: #E8E8ED; position: absolute; 
            background-image: radial-gradient(#D1D1D6 1px, transparent 1px); background-size: 24px 24px;
        }

        /* --- Floating Booking Panel --- */
        .booking-panel {
            position: absolute; background: var(--card-bg); display: flex; flex-direction: column; z-index: 20;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (max-width: 899px) {
            .booking-panel { bottom: 95px; left: 15px; right: 15px; height: 50vh; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
            .sidebar { display: none; }
        }

        @media (min-width: 900px) {
            .sidebar { display: flex; }
            .booking-panel { top: 30px; left: 30px; width: 400px; height: calc(100vh - 60px); border-radius: 24px; padding: 30px; }
            .mobile-nav { display: none; }
        }

        /* --- UI Components --- */
        .ride-list { overflow-y: auto; flex: 1; margin: 15px 0; }
        .ride-card {
            display: flex; align-items: center; justify-content: space-between; padding: 15px;
            border-radius: 16px; margin-bottom: 8px; border: 2px solid transparent; background: #f9f9fb; cursor: pointer;
        }
        .ride-card.active { border-color: var(--primary-blue); background: rgba(0,0,255,0.02); }

        .ui-avatar {
            width: 45px; height: 45px; border-radius: 50%; background: var(--primary-gradient);
            color: white; display: flex; align-items: center; justify-content: center; font-weight: 700;
        }

        .confirm-btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: var(--primary-gradient); color: white; font-weight: 600; cursor: pointer;
        }

        /* --- Floating Mobile Nav --- */
        .mobile-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 65px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 20px; display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); z-index: 100;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--primary-blue); }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }

        #auth-overlay {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="color: var(--primary-blue); margin-bottom: 20px;">VynixRide</h1>
        <button onclick="login()" class="confirm-btn" style="width: auto; padding: 15px 40px;">Sign in with Google</button>
    </div>

    <div class="layout-wrapper" id="app-ui" style="display: none;">
        <aside class="sidebar">
            <h2 style="color: var(--primary-blue); margin-bottom: 30px;">Vynix</h2>
            <nav style="display:flex; flex-direction:column; gap:10px;">
                <div class="nav-link active">Ride</div>
                <div class="nav-link">Activity</div>
                <div class="nav-link">Payment</div>
            </nav>
            <div id="user-info" style="margin-top:auto; display:flex; align-items:center; gap:10px;"></div>
        </aside>

        <main class="main-content">
            <div class="map-view"></div>
            <div class="booking-panel">
                <h2 id="greeting">Where to?</h2>
                <div class="ride-list" id="rideList">Loading rides...</div>
                <button class="confirm-btn" id="confirmBtn">Confirm Ride</button>
            </div>
        </main>

        <nav class="mobile-nav">
            <div class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span style="font-size:10px">Ride</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span style="font-size:10px">Activity</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span style="font-size:10px">Account</span>
            </div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
            authDomain: "fire-b-a8878.firebaseapp.com",
            databaseURL: "https://fire-b-a8878.firebaseio.com",
            projectId: "fire-b-a8878",
            storageBucket: "fire-b-a8878.firebasestorage.app",
            messagingSenderId: "658673187627",
            appId: "1:658673187627:web:32699cbc33e85f4bafa36e",
            measurementId: "G-2505EVBRWX"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Authentication Logic
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                document.getElementById('greeting').innerText = `Hi, ${user.displayName.split(' ')[0]}!`;
                
                // Set Sidebar User Info
                document.getElementById('user-info').innerHTML = `
                    <div class="ui-avatar" style="width:35px; height:35px; background:#1d1d1f">${user.displayName.charAt(0)}</div>
                    <span style="font-size:14px; font-weight:600">${user.displayName}</span>
                `;
                
                loadRides();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('app-ui').style.display = 'none';
            }
        });

        // Real-time Database Logic
        function loadRides() {
            const ridesRef = db.ref('rides');
            ridesRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    seedDatabase(); // Auto-populate if DB is empty
                    return;
                }
                renderRides(Object.values(data));
            });
        }

        function renderRides(rides) {
            const list = document.getElementById('rideList');
            list.innerHTML = '';
            rides.forEach((ride, index) => {
                const card = document.createElement('div');
                card.className = `ride-card ${index === 0 ? 'active' : ''}`;
                card.onclick = () => {
                    document.querySelectorAll('.ride-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    document.getElementById('confirmBtn').innerText = `Confirm ${ride.type}`;
                };
                
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="ui-avatar">${ride.driver.charAt(0)}</div>
                        <div>
                            <h4 style="font-size:15px">${ride.type}</h4>
                            <p style="font-size:12px; color:var(--text-muted)">${ride.time} away</p>
                        </div>
                    </div>
                    <div style="font-weight:700">R ${ride.price}</div>
                `;
                list.appendChild(card);
            });
        }

        // Initialize DB with Real Data if empty
        function seedDatabase() {
            const rides = {
                r1: { type: 'VynixGo', price: 45, time: '2 min', driver: 'Kabelo' },
                r2: { type: 'VynixComfort', price: 72, time: '5 min', driver: 'Sarah' },
                r3: { type: 'VynixXL', price: 115, time: '9 min', driver: 'John' }
            };
            db.ref('rides').set(rides);
        }
    </script>
</body>
</html>
