<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VynixRide Web App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0000FF;
            --primary-gradient: linear-gradient(135deg, #3366FF 0%, #0000FF 100%);
            --bg-color: #F5F5F7;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --card-bg: #FFFFFF;
            --border-color: #E5E5EA;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Prevent body scrolling, manage internally */
        }

        /* --- Main Layout Wrapper --- */
        .layout-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- Desktop Sidebar (Hidden on Mobile) --- */
        .sidebar {
            display: none;
            width: 280px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            flex-direction: column;
            padding: 24px;
            z-index: 50;
            box-shadow: 2px 0 20px rgba(0,0,0,0.02);
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(0, 0, 255, 0.04);
            color: var(--primary-blue);
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        /* --- Main Content Area (Map + Booking Panel) --- */
        .main-content {
            flex-grow: 1;
            position: relative;
            height: 100vh;
        }

        /* --- Simulated Map Area --- */
        .map-view {
            width: 100%;
            height: 100%;
            background-color: #E8E8ED;
            position: absolute;
            top: 0;
            left: 0;
            background-image: radial-gradient(#D1D1D6 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
        }

        .location-pin {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: var(--primary-blue);
            border: 4px solid #FFF;
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(0, 0, 255, 0.4);
        }

        .location-pin::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 255, 0.1);
            border-radius: 50%;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* --- Floating Booking Panel --- */
        .booking-panel {
            position: absolute;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Mobile specific booking panel (Bottom Sheet) */
        @media (max-width: 899px) {
            .booking-panel {
                bottom: 0;
                left: 0;
                width: 100%;
                height: 55vh;
                border-radius: 32px 32px 0 0;
                padding: 24px 20px 100px 20px;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
            }
            .map-view {
                height: 50vh; /* Leave room for sheet */
            }
        }

        .drag-handle {
            width: 40px;
            height: 4px;
            background: var(--border-color);
            border-radius: 4px;
            margin: 0 auto 20px auto;
        }

        /* Search Input Area */
        .search-box {
            background: var(--bg-color);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-blue);
            border-radius: 50%;
        }

        .search-input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            width: 100%;
        }

        /* Ride Options */
        .ride-list {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }

        .ride-list::-webkit-scrollbar {
            display: none; /* Hide scrollbar for clean UI */
        }

        .ride-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid transparent;
            background: var(--card-bg);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .ride-card:hover {
            background: var(--bg-color);
        }

        .ride-card.active {
            border-color: var(--primary-blue);
            background: rgba(0, 0, 255, 0.03);
            box-shadow: 0 4px 15px rgba(0, 0, 255, 0.05);
        }

        .ride-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* UI Generated Avatars */
        .ui-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .ride-details h4 {
            font-size: 16px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .ride-details p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .ride-price {
            text-align: right;
        }

        .ride-price h4 {
            font-size: 16px;
            color: var(--text-main);
        }

        /* Confirm Button */
        .confirm-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 255, 0.2);
            transition: transform 0.1s ease;
            margin-top: auto;
        }

        .confirm-btn:active {
            transform: scale(0.98);
        }

        /* --- Mobile Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            z-index: 30;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary-blue);
        }

        /* --- Desktop Responsive Breakpoint --- */
        @media (min-width: 900px) {
            .sidebar {
                display: flex;
            }
            
            .bottom-nav {
                display: none;
            }

            .map-view {
                height: 100%;
            }

            /* Transform Bottom Sheet into Floating Panel */
            .booking-panel {
                top: 32px;
                left: 32px;
                width: 420px;
                height: calc(100vh - 64px);
                max-height: 800px;
                border-radius: 24px;
                padding: 32px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            }

            .drag-handle {
                display: none; /* No drag handle needed on desktop */
            }
        }

    </style>
</head>
<body>

    <div class="layout-wrapper">
        
        <aside class="sidebar">
            <div class="brand-logo">
                <div class="ui-avatar" style="width: 32px; height: 32px; font-size: 14px;">VX</div>
                VynixRide
            </div>
            
            <nav class="nav-links">
                <a class="nav-link active">Book a Ride</a>
                <a class="nav-link">My Trips</a>
                <a class="nav-link">Wallet</a>
                <a class="nav-link">Saved Places</a>
                <a class="nav-link" style="margin-top: auto;">Settings</a>
            </nav>

            <div class="user-profile-mini">
                <div class="ui-avatar" style="width: 40px; height: 40px; background: #1D1D1F;">KP</div>
                <div>
                    <h4 style="font-size: 14px; color: var(--text-main);">K. Phasha</h4>
                    <p style="font-size: 12px; color: var(--text-muted);">Manage Account</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            
            <div class="map-view">
                <div class="location-pin"></div>
            </div>

            <div class="booking-panel">
                <div class="drag-handle"></div>
                
                <h2 style="margin-bottom: 20px; font-size: 24px;">Where to?</h2>

                <div class="search-box">
                    <div class="search-dot"></div>
                    <input type="text" class="search-input" value="Mokopane Mall" readonly>
                </div>

                <h3 style="margin: 10px 0 16px 0; font-size: 16px; color: var(--text-muted);">Available Rides</h3>

                <div class="ride-list" id="rideList">
                    </div>

                <button class="confirm-btn" id="confirmBtn">Confirm Ride</button>
            </div>
            
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active">
                <div style="font-size: 20px;">🚙</div>
                <span>Ride</span>
            </div>
            <div class="nav-item">
                <div style="font-size: 20px;">📋</div>
                <span>Trips</span>
            </div>
            <div class="nav-item">
                <div style="font-size: 20px;">👤</div>
                <span>Account</span>
            </div>
        </nav>

    </div>

    <script>
        const rideData = [
            { id: 1, type: 'VynixGo', time: '3 min', capacity: 4, price: 45.00, driver: 'Kabelo P.', specs: 'Compact' },
            { id: 2, type: 'VynixComfort', time: '7 min', capacity: 4, price: 68.50, driver: 'Thabo M.', specs: 'Newer cars, extra legroom' },
            { id: 3, type: 'VynixXL', time: '12 min', capacity: 6, price: 110.00, driver: 'Lesego R.', specs: 'SUVs & Vans' },
            { id: 4, type: 'VynixBlack', time: '15 min', capacity: 4, price: 185.00, driver: 'David', specs: 'Premium rides' }
        ];

        let selectedRideId = 1;

        // UI-Avatar Generator (Zero Cloudinary/Image dependency)
        const getInitials = (name) => {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        };

        const renderRides = () => {
            const listContainer = document.getElementById('rideList');
            listContainer.innerHTML = '';

            rideData.forEach(ride => {
                const isActive = ride.id === selectedRideId ? 'active' : '';
                const avatarInitials = getInitials(ride.driver);
                
                const rideEl = document.createElement('div');
                rideEl.className = `ride-card ${isActive}`;
                rideEl.onclick = () => selectRide(ride.id);

                rideEl.innerHTML = `
                    <div class="ride-info">
                        <div class="ui-avatar">${avatarInitials}</div>
                        <div class="ride-details">
                            <h4>${ride.type} <span style="font-weight:400; font-size:12px; color:var(--text-muted);">👤 ${ride.capacity}</span></h4>
                            <p>${ride.time} away &#183; ${ride.specs}</p>
                        </div>
                    </div>
                    <div class="ride-price">
                        <h4>R ${ride.price.toFixed(2)}</h4>
                    </div>
                `;
                listContainer.appendChild(rideEl);
            });
        };

        const selectRide = (id) => {
            selectedRideId = id;
            renderRides();
            
            const selectedRide = rideData.find(r => r.id === id);
            document.getElementById('confirmBtn').innerText = `Confirm ${selectedRide.type}`;
        };

        // Initialize 
        renderRides();
        selectRide(1); // Set default active state
    </script>
</body>
</html>
